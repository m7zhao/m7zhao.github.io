<!DOCTYPE html>
<html lang="en">
<head>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0ede8;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      background: linear-gradient(155deg, #163d12 0%, #2d6127 55%, #3d7a35 100%);
      color: white;
      padding: 10px 16px 9px;
      flex-shrink: 0;
    }
    .header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; line-height: 1.2; }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.72); margin-top: 2px; }

    /* ── Tab bar ─────────────────────────────────────────── */
    .tabs {
      background: white;
      display: flex;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      z-index: 100;
    }
    .tab {
      flex: 1;
      padding: 9px 4px 7px;
      text-align: center;
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      color: #9ca3af;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      user-select: none;
      transition: color 0.18s;
    }
    .tab .ico { font-size: 19px; display: block; margin-bottom: 2px; line-height: 1; }
    .tab.active { color: #2d6127; border-bottom-color: #2d6127; }

    /* ── Panel system ────────────────────────────────────── */
    .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .panel.active { display: flex; }

    /* ── Itinerary panel ─────────────────────────────────── */
    .day-scroller {
      background: white;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .day-scroller::-webkit-scrollbar { display: none; }
    .day-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #e5e7eb;
      background: white;
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .day-btn.active { color: white; border-color: transparent; }
    .day-btn.today { border-color: #e8a838; }

    .day-panels-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .day-panel { display: none; padding-bottom: 48px; }
    .day-panel.active { display: block; }

    .day-heading { padding: 18px 20px 10px; }
    .day-heading-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .day-name { font-size: 20px; font-weight: 800; }
    .today-pill {
      background: #fbbf24;
      color: #78350f;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .day-label { font-size: 14px; font-weight: 700; margin-top: 4px; }
    .day-meta { font-size: 12.5px; color: #6b7280; margin-top: 2px; }

    /* ── Weather card ───────────────────────────────────── */
    .wx-card {
      margin: 8px 16px 10px;
      background: white;
      border-radius: 12px;
      padding: 11px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 52px;
    }
    .wx-icon { font-size: 30px; line-height: 1; flex-shrink: 0; }
    .wx-body { flex: 1; min-width: 0; }
    .wx-temps { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
    .wx-celsius { font-size: 12px; font-weight: 500; color: #9ca3af; letter-spacing: 0; }
    .wx-condition { font-size: 12.5px; font-weight: 600; color: #374151; margin-top: 1px; }
    .wx-details { font-size: 11.5px; color: #6b7280; margin-top: 2px; }
    .wx-location { font-size: 10px; color: #9ca3af; margin-top: 2px; font-style: italic; }
    .wx-loading {
      width: 100%;
      text-align: center;
      color: #9ca3af;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .wx-spinner {
      width: 14px; height: 14px;
      border: 2px solid #e5e7eb;
      border-top-color: #9ca3af;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Timeline stops */
    .stops { padding: 0 16px; }
    .stop-row { display: flex; align-items: stretch; margin-bottom: 0; }
    .timeline-col { display: flex; flex-direction: column; align-items: center; width: 32px; flex-shrink: 0; padding-top: 12px; }
    .stop-num {
      width: 26px; height: 26px;
      border-radius: 50%;
      color: white;
      font-size: 12px;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .tl-line { width: 2px; flex: 1; min-height: 16px; background: #e5e7eb; margin-top: 4px; }
    .stop-card {
      flex: 1;
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      margin: 8px 0 0 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .stop-card.hotel { border-left: 3px solid #e8a838; }
    .stop-name { font-size: 14.5px; font-weight: 700; line-height: 1.3; }
    .stop-type { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .stop-drive { font-size: 12px; color: #6b7280; margin-top: 6px; }

    /* ── Map panel ───────────────────────────────────────── */
    #map { flex: 1; width: 100%; }

    /* ── Overview panel ─────────────────────────────────── */
    .overview-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding-bottom: 4px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .stat-value { font-size: 22px; font-weight: 800; color: #1a1a1a; }
    .stat-label { font-size: 11.5px; color: #9ca3af; margin-top: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .section-heading {
      font-size: 11px;
      font-weight: 800;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      padding: 16px 0 8px;
    }

    /* ── Hotels panel ────────────────────────────────────── */
    .hotels-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .hotels-inner { padding: 16px; max-width: 560px; margin: 0 auto; }
    .hotel-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .hotel-banner {
      padding: 18px 20px;
      color: white;
    }
    .hotel-banner h3 { font-size: 17px; font-weight: 800; line-height: 1.3; }
    .hotel-dates { font-size: 12px; opacity: 0.85; margin-top: 4px; }
    .hotel-body { padding: 16px 20px; }
    .field { margin-bottom: 13px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      font-size: 10px; font-weight: 800;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 3px;
    }
    .field-val { font-size: 14px; color: #1a1a1a; }
    .field-val.muted { color: #4b5563; }

    /* ── Flight cards ────────────────────────────────── */
    .flight-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .flight-banner {
      padding: 14px 20px;
      color: white;
    }
    .flight-banner-title { font-size: 14px; font-weight: 800; line-height: 1.3; }
    .flight-banner-date { font-size: 12px; opacity: 0.85; margin-top: 3px; }
    .flight-body { padding: 16px 20px; }
    .flight-route {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .flight-stop { text-align: center; flex-shrink: 0; }
    .flight-iata { font-size: 22px; font-weight: 900; color: #1a1a1a; letter-spacing: -0.5px; }
    .flight-city { font-size: 10px; color: #9ca3af; font-weight: 600; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
    .flight-leg {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 0 6px;
      padding-bottom: 14px;
    }
    .flight-leg-plane { font-size: 13px; color: #6b7280; }
    .flight-leg-line { width: 100%; border-top: 1.5px dashed #d1d5db; }

    /* Map day toggles */
    .map-toggles {
      background: white;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .map-toggles::-webkit-scrollbar { display: none; }
    .map-toggle {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    /* Responsive bump */
    @media (min-width: 600px) {
      .header h1 { font-size: 24px; }
      .stop-name { font-size: 15px; }
    }
  </style>
</head>

// ITINERARY

(function buildItinerary() {
  const scroller = document.getElementById('day-scroller');
  const wrap = document.getElementById('day-panels-wrap');

  // Default to today's day, or day 0 if before trip, last day if after
  const todayIdx = DAYS.findIndex(d => d.isToday);
  const startIdx = todayIdx >= 0 ? todayIdx : (TODAY_ISO < DAYS[0].isoDate ? 0 : DAYS.length - 1);

  DAYS.forEach((day, i) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (i === startIdx ? ' active' : '') + (day.isToday ? ' today' : '');
    btn.textContent = day.short;
    btn.onclick = () => showDay(i);
    if (i === startIdx) { btn.style.background = day.color; btn.style.color = 'white'; btn.style.borderColor = day.color; }
    scroller.appendChild(btn);

    // Day panel
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (i === startIdx ? ' active' : '');
    panel.id = 'dp-' + i;

    let html = `
      <div class="day-heading">
        <div class="day-heading-row">
          <span class="day-name">${day.date}</span>
          ${day.isToday ? '<span class="today-pill">Today</span>' : ''}
        </div>
        <div class="day-label" style="color:${day.color}">${day.label}</div>
        <div class="day-meta">${day.meta}</div>
      </div>
      <div class="wx-card" id="wx-${i}">
        <div class="wx-loading"><div class="wx-spinner"></div>Loading weather…</div>
      </div>
      <div class="stops">
    `;

    day.stops.forEach((s, si) => {
      const last = si === day.stops.length - 1;
      html += `
        <div class="stop-row">
          <div class="timeline-col">
            <div class="stop-num" style="background:${day.color}">${si + 1}</div>
            ${!last ? '<div class="tl-line"></div>' : ''}
          </div>
          <div class="stop-card${s.hotel ? ' hotel' : ''}">
            <div class="stop-name">${s.n}</div>
            <div class="stop-type">${s.t}</div>
            ${s.drive ? `<div class="stop-drive">→ ${s.drive}</div>` : ''}
          </div>
        </div>
      `;
    });

    html += '</div>';
    panel.innerHTML = html;
    wrap.appendChild(panel);
  });
})();

let activeDay = 0;
function showDay(i) {
  const btns = document.querySelectorAll('.day-btn');
  const panels = document.querySelectorAll('.day-panel');
  btns.forEach((b, bi) => {
    b.classList.toggle('active', bi === i);
    b.style.background = bi === i ? DAYS[bi].color : '';
    b.style.color = bi === i ? 'white' : '';
    b.style.borderColor = bi === i ? DAYS[bi].color : (DAYS[bi].isToday ? '#e8a838' : '');
  });
  panels.forEach((p, pi) => p.classList.toggle('active', pi === i));
  activeDay = i;
  document.getElementById('day-panels-wrap').scrollTop = 0;
  updateURL();
}

// ============================================================
// WEATHER  (Open-Meteo, free, no API key)
// ============================================================
async function fetchDayWeather(day, i, attempt = 0) {
  const BASE = 'https://api.open-meteo.com/v1/forecast';
  const PARAMS = 'daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode,windspeed_10m_max'
    + '&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch&timezone=America%2FDenver';
  const el = document.getElementById('wx-' + i);
  if (!el) return;

  const [lat, lon] = day.weatherCoord;
  const url = `${BASE}?latitude=${lat}&longitude=${lon}&${PARAMS}&start_date=${day.isoDate}&end_date=${day.isoDate}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const d = data.daily;
    if (!d?.time?.length) throw new Error('no data');

    const code   = d.weathercode[0];
    const wx     = WX[code] ?? { icon: '🌡️', desc: 'See forecast' };
    const highF  = Math.round(d.temperature_2m_max[0]);
    const lowF   = Math.round(d.temperature_2m_min[0]);
    const highC  = Math.round((highF - 32) * 5 / 9);
    const lowC   = Math.round((lowF  - 32) * 5 / 9);
    const precip = d.precipitation_sum[0];
    const wind   = Math.round(d.windspeed_10m_max[0]);

    // Cache for map popups
    wxCache[i] = { icon: wx.icon, desc: wx.desc, high: highF, low: lowF };

    const extras = [];
    if (precip > 0.01) extras.push(`💧 ${precip.toFixed(2)}"`);
    extras.push(`💨 ${wind} mph`);

    el.innerHTML = `
      <div class="wx-icon">${wx.icon}</div>
      <div class="wx-body">
        <div class="wx-temps">${highF}°F / ${lowF}°F <span class="wx-celsius">${highC}°C / ${lowC}°C</span></div>
        <div class="wx-condition">${wx.desc}</div>
        <div class="wx-details">${extras.join(' · ')}</div>
        <div class="wx-location">${day.weatherLocation}</div>
      </div>
    `;
  } catch {
    if (attempt < 2) {
      // Retry after a short back-off
      await new Promise(r => setTimeout(r, 800 * (attempt + 1)));
      return fetchDayWeather(day, i, attempt + 1);
    }
    el.innerHTML = '<div class="wx-loading" style="color:#d1d5db">Weather unavailable</div>';
  }
}

async function loadWeather() {
  // Stagger requests 150 ms apart to stay within Open-Meteo rate limits
  for (let i = 0; i < DAYS.length; i++) {
    fetchDayWeather(DAYS[i], i); // fire-and-forget — UI updates as each resolves
    if (i < DAYS.length - 1) await new Promise(r => setTimeout(r, 150));
  }
}

// ============================================================
// MAP
// ============================================================
let map = null;
const wxCache = {};
const markersByDay = {};
const dayVisible = {};

function initMap() {
  if (map) return;

  map = L.map('map', { zoomControl: true }).setView([44.4, -110.5], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18,
  }).addTo(map);

  // Route polyline
  const routeCoords = DAYS.flatMap(d => d.stops.filter(s => s.coords).map(s => s.coords));
  L.polyline(routeCoords, { color: '#6b7280', weight: 2.5, dashArray: '6 5', opacity: 0.55 }).addTo(map);

  // Stop markers — grouped by day
  DAYS.forEach(day => {
    markersByDay[day.id] = [];
    dayVisible[day.id] = true;

    day.stops.forEach(s => {
      if (!s.coords) return;
      const marker = L.circleMarker(s.coords, {
        radius: s.hotel ? 10 : 7,
        fillColor: day.color,
        color: 'white',
        weight: 2,
        fillOpacity: 0.92,
      }).addTo(map);

      marker.bindPopup(
        `<div style="font-size:13px;line-height:1.6">
          <strong>${s.n}</strong><br>
          <span style="color:#6b7280">${day.date}</span><br>
          <span>${s.t}</span>
          <div id="map-wx-${day.id}" style="margin-top:4px;font-size:12px;color:#374151"></div>
        </div>`,
        { maxWidth: 230 }
      );

      marker.on('popupopen', () => {
        const wxEl = document.getElementById('map-wx-' + day.id);
        if (!wxEl) return;
        const wx = wxCache[day.id];
        if (wx) wxEl.innerHTML = `${wx.icon} ${wx.high}°/${wx.low}°F · ${wx.desc}`;
        else wxEl.textContent = 'Loading weather…';
      });

      markersByDay[day.id].push(marker);
    });
  });

  // Interactive day toggle strip
  const togglesEl = document.createElement('div');
  togglesEl.className = 'map-toggles';

  DAYS.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'map-toggle';
    btn.textContent = day.short;
    btn.style.borderColor = day.color;
    btn.style.background = day.color;
    btn.style.color = 'white';
    btn.onclick = () => {
      const nowVisible = !dayVisible[day.id];
      dayVisible[day.id] = nowVisible;
      markersByDay[day.id].forEach(m => nowVisible ? m.addTo(map) : map.removeLayer(m));
      btn.style.background = nowVisible ? day.color : 'white';
      btn.style.color = nowVisible ? 'white' : day.color;
      btn.style.opacity = nowVisible ? '1' : '0.5';
    };
    togglesEl.appendChild(btn);
  });

  const mapPanel = document.getElementById('panel-map');
  mapPanel.insertBefore(togglesEl, document.getElementById('map'));
  map.fitBounds(L.latLngBounds(routeCoords).pad(0.08));
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(name) {
  ['itinerary', 'map', 'hotels'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === name);
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
  });
  if (name === 'map') {
    initMap();
    setTimeout(() => map && map.invalidateSize(), 80);
  }
  updateURL();
}

// ============================================================
// URL PERSISTENCE
// ============================================================
const TAB_TO_URL = { hotels: 'overview', itinerary: 'itinerary', map: 'map' };
const URL_TO_TAB = { overview: 'hotels', itinerary: 'itinerary', map: 'map' };
let _urlReady = false;

function updateURL() {
  if (!_urlReady) return;
  const activeTabEl = document.querySelector('.tab.active');
  const tabId = activeTabEl ? activeTabEl.id.replace('tab-', '') : 'hotels';
  const p = new URLSearchParams();
  p.set('tab', TAB_TO_URL[tabId] || tabId);
  if (tabId === 'itinerary' && DAYS[activeDay]) p.set('day', DAYS[activeDay].isoDate);
  history.replaceState(null, '', '?' + p.toString());
}

// ============================================================
// INIT
// ============================================================
(function init() {
  const params = new URLSearchParams(location.search);

  // Restore day before tab so activeDay is correct when tab restores
  const urlDay = params.get('day');
  if (urlDay) {
    const idx = DAYS.findIndex(d => d.isoDate === urlDay);
    if (idx >= 0) showDay(idx);
  }

  // Restore tab
  const urlTabParam = params.get('tab');
  const urlTab = URL_TO_TAB[urlTabParam];
  if (urlTab) switchTab(urlTab);

  // Enable URL writes and write canonical URL
  _urlReady = true;
  updateURL();

  loadWeather();
})();
